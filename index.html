    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="css/gateway.css" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DuArt | دوآرت",
      "alternateName": "DuArt Studio",
      "description": "استودیوی طراحی سایت و تولید محتوا",
      "url": "https://duart.ir",
      "keywords": "طراحی سایت, تدوین ویدیو, تولید محتوا, ادمین کانال",
      "member": [
        { "@type": "Person", "name": "WebArt", "jobTitle": "Frontend Developer", "url": "https://duart.ir/dev/" },
        { "@type": "Person", "name": "RUDY", "jobTitle": "Video Editor & Content Manager", "url": "https://duart.ir/editor/" }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DuArt | دوآرت",
      "alternateName": "DuArt Studio",
      "url": "https://duart.ir",
      "description": "طراحی سایت حرفه‌ای و تدوین ویدیو — استودیوی دوآرت",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://duart.ir/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-content">
        <span class="loading-logo">DuArt</span>
        <span class="loading-sub"> دوآرت</span>
        <div class="loading-bar"></div>
      </div>
    </div>

    <main class="gateway" role="main">
      <div class="side side-dev" id="sideDev">
        <div class="side-content" id="contentDev">
          <div class="icon-wrapper">
            <span class="icon"><i class="fa-solid fa-code"></i></span>
          </div>
          <h2 class="side-label">طراحی سایت</h2>
          <p class="side-sub">کد و خلاقیت</p>
          <p class="side-desc">کد تمیز • طراحی مدرن • تجربه کاربری متفاوت</p>
          <a href="dev/" class="enter-btn enter-btn-dev" id="btnDev">
            <span class="btn-text">مشاهده نمونه کار ها</span>
          </a>
        </div>
      </div>

      <div class="side side-editor" id="sideEditor">
        <div class="side-content" id="contentEditor">
          <div class="icon-wrapper">
            <span class="icon"><i class="fa-solid fa-clapperboard"></i></span>
          </div>
          <h2 class="side-label">تدوینگر</h2>
          <p class="side-sub">محتوا و رسانه</p>
          <p class="side-desc">ادمین کانال • ادیت ویدیو • مدیریت محتوا</p>
          <a href="editor/" class="enter-btn enter-btn-editor" id="btnEditor">
            <span class="btn-text">مشاهده نمونه کار ها</span>
          </a>
        </div>
      </div>

      <div class="gateway-logo">
        <img src="assets/duart-logo-left.png" alt="" class="logo-half logo-left" />
        <img src="assets/duart-logo-right.png" alt="DuArt | دوآرت" class="logo-half logo-right" />
      </div>
      <canvas id="particleCanvas" class="particle-canvas"></canvas>
    </main>

    <div class="gateway-credit">DuArt &copy; 2026</div>

    <script src="js/gateway.js" defer></script>
    <script>
      (function () {
        var ls = document.getElementById("loadingScreen");
        function hide() { ls.classList.add("hidden"); }
        var btn = document.getElementById("btnDev");
        if (btn.classList.contains("built")) { hide(); return; }
        var obs = new MutationObserver(function () {
          if (btn.classList.contains("built")) { hide(); obs.disconnect(); }
        });
        obs.observe(btn, { attributes: true, attributeFilter: ["class"] });
        setTimeout(function () { obs.disconnect(); hide(); }, 15000);
      })();
    </script>
  </body>
</html>
